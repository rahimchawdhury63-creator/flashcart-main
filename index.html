<!DOCTYPE html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1A6B3C" />

    <!--
      DEFAULT SEO META
      These are meaningful defaults so crawlers and social platforms always see
      real content even before React hydrates. React Helmet overrides these
      per-page at runtime.
    -->
    <title>FlashCart Bangladesh — Free Online Delivery | আপনার কাছের দোকান থেকে অর্ডার করুন</title>
    <meta
      name="description"
      content="FlashCart — Bangladesh's free cash-on-delivery platform. Order food, groceries, medicine & more from local stores near you. ক্যাশ অন ডেলিভারিতে অর্ডার করুন।"
    />
    <meta name="keywords" content="FlashCart, Bangladesh delivery, online order, cash on delivery, food delivery, grocery, রেস্টুরেন্ট, ডেলিভারি" />
    <link rel="canonical" href="https://flashcart.bsdc.info.bd/" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="FlashCart Bangladesh" />
    <meta property="og:title" content="FlashCart Bangladesh — Free Online Delivery" />
    <meta property="og:description" content="Order food, groceries, medicine & more from local stores near you. Cash on delivery." />
    <meta property="og:url" content="https://flashcart.bsdc.info.bd/" />
    <meta property="og:locale" content="bn_BD" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FlashCart Bangladesh — Free Online Delivery" />
    <meta name="twitter:description" content="Order food, groceries, medicine & more from local stores. Cash on delivery." />

    <!-- hreflang for multilingual SEO -->
    <link rel="alternate" hreflang="bn" href="https://flashcart.bsdc.info.bd/bn" />
    <link rel="alternate" hreflang="en" href="https://flashcart.bsdc.info.bd/en" />
    <link rel="alternate" hreflang="x-default" href="https://flashcart.bsdc.info.bd/" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Fonts: Inter (UI) + Hind Siliguri (Bangla). font-display:swap avoids blocking render. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Leaflet CSS (maps). Loaded from CDN so no bundling needed. -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <!-- Organization JSON-LD (site-wide structured data for SEO). -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "FlashCart Bangladesh",
        "url": "https://flashcart.bsdc.info.bd",
        "logo": "https://flashcart.bsdc.info.bd/favicon.svg",
        "description": "Free cash-on-delivery e-commerce and delivery platform for local businesses in Bangladesh.",
        "areaServed": "BD",
        "founder": "Rizwan Rahim Chowdhury"
      }
    </script>
  </head>
  <body>
    <!--
      Fallback content for crawlers / no-JS users. Gives meaningful initial HTML.
    -->
    <noscript>
      <h1>FlashCart Bangladesh — Free Online Delivery</h1>
      <p>
        Order food, groceries, medicine, electronics and more from local stores
        near you with cash on delivery. Please enable JavaScript to use FlashCart.
      </p>
    </noscript>

    <!-- React mount point. -->
    <div id="root"></div>

    <!-- App entry. type=module enables ESM + code-splitting. -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
