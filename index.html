<!DOCTYPE html>
<!--
  ============================================================
  FlashCart — Customer Portal
  Bangladesh's Fastest Free Delivery Platform
  Developer: Rizwan Rahim Chowdhury
  Powered by: Bangladesh Software Development Community
  Website: https://www.bsdc.info.bd
  ============================================================
  
  IMPORTANT SEO NOTE:
  This index.html contains default meta tags that serve as
  fallback content for Googlebot when React has not yet
  rendered. React Helmet Async will OVERRIDE these tags
  dynamically on each route. This dual approach ensures:
  1. Googlebot always sees meaningful content immediately
  2. Each page gets unique, route-specific meta tags
  3. Social media previews work correctly
  ============================================================
-->
<html lang="bn" dir="ltr">

<head>
  <!-- ── CHARACTER ENCODING ────────────────────────────── -->
  <!-- Must be first element in head for correct rendering -->
  <meta charset="UTF-8" />

  <!-- ── VIEWPORT ──────────────────────────────────────── -->
  <!-- Mobile-first viewport — prevents zooming issues on mobile -->
  <!-- width=device-width: use device's actual width -->
  <!-- initial-scale=1.0: no zoom on load -->
  <!-- viewport-fit=cover: handles iPhone notch/safe areas -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- ── THEME COLOR ────────────────────────────────────── -->
  <!-- Android Chrome browser toolbar color — matches FC primary green -->
  <meta name="theme-color" content="#1B5E20" />

  <!-- ── PRIMARY SEO TITLE ─────────────────────────────── -->
  <!-- Default title — React Helmet Async overrides per route -->
  <!-- Format: Primary Keyword | Brand — Location (50-60 chars) -->
  <title>FlashCart — Bangladesh's Fastest Free Delivery Platform | ফ্ল্যাশকার্ট</title>

  <!-- ── META DESCRIPTION ──────────────────────────────── -->
  <!-- Default description — React Helmet Async overrides per route -->
  <!-- 150-160 characters for optimal Google display -->
  <meta name="description" content="FlashCart — বাংলাদেশের সেরা ফ্রি ডেলিভারি প্ল্যাটফর্ম। রেস্টুরেন্ট, মুদি দোকান, ওষুধ — সব ঘরে পৌঁছে দেই। ক্যাশ অন ডেলিভারি। Free delivery platform Bangladesh." />

  <!-- ── META KEYWORDS ──────────────────────────────────── -->
  <!-- Bilingual keywords — Bangla + English for maximum reach -->
  <meta name="keywords" content="flashcart, ফ্ল্যাশকার্ট, bangladesh delivery, বাংলাদেশ ডেলিভারি, food delivery, খাবার ডেলিভারি, grocery delivery, cash on delivery, online order bangladesh, free delivery" />

  <!-- ── ROBOTS ─────────────────────────────────────────── -->
  <!-- Allow Googlebot to index and follow all links -->
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />

  <!-- ── AUTHOR & ATTRIBUTION ───────────────────────────── -->
  <meta name="author" content="Rizwan Rahim Chowdhury — Bangladesh Software Development Community" />
  <meta name="copyright" content="FlashCart — Bangladesh Software Development Community" />
  <meta name="generator" content="React 18 + Vite 5 — FlashCart Platform" />

  <!-- ── CANONICAL URL ──────────────────────────────────── -->
  <!-- Default canonical — React Helmet overrides per route -->
  <link rel="canonical" href="https://flashcart.bsdc.info.bd/" />

  <!-- ── OPEN GRAPH (Facebook, WhatsApp, LinkedIn) ─────── -->
  <!-- og:type — website for homepage, article for store pages -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="FlashCart" />
  <meta property="og:title" content="FlashCart — Bangladesh's Fastest Free Delivery Platform" />
  <meta property="og:description" content="বাংলাদেশের সেরা ফ্রি ডেলিভারি প্ল্যাটফর্ম। রেস্টুরেন্ট, মুদি দোকান, ওষুধ — ঘরে পৌঁছে দেই। Cash on Delivery only." />
  <meta property="og:url" content="https://flashcart.bsdc.info.bd/" />
  <!-- og:image — 1200x630px image stored in public/ -->
  <meta property="og:image" content="https://flashcart.bsdc.info.bd/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="FlashCart — Bangladesh's Fastest Free Delivery Platform" />
  <!-- Primary locale Bangladesh Bangla -->
  <meta property="og:locale" content="bn_BD" />
  <!-- Alternate locale English -->
  <meta property="og:locale:alternate" content="en_US" />

  <!-- ── TWITTER CARD ────────────────────────────────────── -->
  <!-- summary_large_image shows full image in tweet previews -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="FlashCart — Bangladesh's Fastest Free Delivery Platform" />
  <meta name="twitter:description" content="বাংলাদেশের সেরা ফ্রি ডেলিভারি প্ল্যাটফর্ম। Cash on Delivery. Free delivery for customers." />
  <meta name="twitter:image" content="https://flashcart.bsdc.info.bd/og-image.png" />
  <meta name="twitter:image:alt" content="FlashCart Delivery Platform" />

  <!-- ── HREFLANG (Bilingual SEO) ───────────────────────── -->
  <!-- Tells Google this site has Bangla and English versions -->
  <!-- Both point to same URL since it's dynamic language switching -->
  <link rel="alternate" hreflang="bn" href="https://flashcart.bsdc.info.bd/" />
  <link rel="alternate" hreflang="en" href="https://flashcart.bsdc.info.bd/" />
  <!-- x-default: default version for users with no language preference -->
  <link rel="alternate" hreflang="x-default" href="https://flashcart.bsdc.info.bd/" />

  <!-- ── FAVICONS ────────────────────────────────────────── -->
  <!-- SVG favicon — modern browsers prefer SVG -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <!-- Fallback PNG favicons for older browsers -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.svg" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.svg" />
  <!-- Apple Touch Icon for iOS home screen -->
  <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />

  <!-- ── PWA MANIFEST ────────────────────────────────────── -->
  <!-- Links to the PWA manifest file for installability -->
  <link rel="manifest" href="/site.webmanifest" />

  <!-- ── PRECONNECT (Performance) ───────────────────────── -->
  <!-- Tell browser to connect to these domains early -->
  <!-- Reduces latency for critical third-party resources -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://firestore.googleapis.com" />
  <link rel="preconnect" href="https://identitytoolkit.googleapis.com" />

  <!-- ── GOOGLE FONTS ────────────────────────────────────── -->
  <!-- Inter for English text — modern, readable sans-serif -->
  <!-- Hind Siliguri for Bangla text — native Bengali script -->
  <!-- display=swap prevents FOIT (Flash of Invisible Text) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- ── SCHEMA.ORG DEFAULT JSON-LD ─────────────────────── -->
  <!-- WebSite schema — tells Google about FlashCart as a brand -->
  <!-- React Helmet adds page-specific schemas on each route -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "FlashCart",
      "alternateName": "ফ্ল্যাশকার্ট",
      "url": "https://flashcart.bsdc.info.bd",
      "description": "Bangladesh's Fastest Free Delivery Platform — বাংলাদেশের সেরা ফ্রি ডেলিভারি প্ল্যাটফর্ম",
      "inLanguage": ["bn-BD", "en-US"],
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://flashcart.bsdc.info.bd/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      },
      "publisher": {
        "@type": "Organization",
        "name": "Bangladesh Software Development Community",
        "url": "https://www.bsdc.info.bd",
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer service",
          "availableLanguage": ["Bengali", "English"]
        }
      }
    }
  </script>

  <!-- ── ORGANIZATION SCHEMA ────────────────────────────── -->
  <!-- Helps Google understand FlashCart as a real business entity -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "FlashCart",
      "alternateName": "ফ্ল্যাশকার্ট",
      "url": "https://flashcart.bsdc.info.bd",
      "logo": "https://flashcart.bsdc.info.bd/og-image.png",
      "description": "Bangladesh's fastest free delivery platform connecting customers with local businesses",
      "foundingDate": "2024",
      "founders": [
        {
          "@type": "Person",
          "name": "Rizwan Rahim Chowdhury"
        }
      ],
      "parentOrganization": {
        "@type": "Organization",
        "name": "Bangladesh Software Development Community",
        "url": "https://www.bsdc.info.bd"
      },
      "areaServed": {
        "@type": "Country",
        "name": "Bangladesh"
      },
      "sameAs": [
        "https://flashcart.bsdc.info.bd",
        "https://partner.flashcart.bsdc.info.bd",
        "https://docs.flashcart.bsdc.info.bd"
      ]
    }
  </script>
</head>

<body>
  <!-- ── NO-SCRIPT FALLBACK ──────────────────────────────── -->
  <!-- Shown to users/bots with JavaScript disabled -->
  <!-- Also helps Googlebot understand site purpose immediately -->
  <noscript>
    <div style="
      font-family: 'Hind Siliguri', sans-serif;
      text-align: center;
      padding: 40px 20px;
      background: #1B5E20;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    ">
      <h1 style="font-size: 28px; margin-bottom: 16px;">FlashCart — ফ্ল্যাশকার্ট</h1>
      <p style="font-size: 16px; max-width: 500px; line-height: 1.6;">
        বাংলাদেশের সেরা ফ্রি ডেলিভারি প্ল্যাটফর্ম ব্যবহার করতে JavaScript সক্রিয় করুন।
        <br />
        Please enable JavaScript to use FlashCart — Bangladesh's Fastest Free Delivery Platform.
      </p>
      <p style="font-size: 14px; margin-top: 24px; opacity: 0.8;">
        Powered by Bangladesh Software Development Community — bsdc.info.bd
      </p>
    </div>
  </noscript>

  <!-- ── REACT ROOT ──────────────────────────────────────── -->
  <!-- React mounts the entire application here -->
  <!-- id="root" is referenced in main.jsx -->
  <div id="root"></div>

  <!-- ── REACT ENTRY POINT ───────────────────────────────── -->
  <!-- Vite processes this as the ES module entry point -->
  <!-- type="module" enables ES module syntax -->
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
