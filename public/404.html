<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FlashCart — Redirecting...</title>
    <script>
      // Cloudflare Pages SPA routing technique:
      // store the requested deep-link path, then redirect to the app root.
      // App.jsx reads sessionStorage 'redirect' and navigates to the real route.
      (function () {
        sessionStorage.setItem('redirect', location.pathname + location.search + location.hash);
        location.replace('/');
      })();
    </script>
  </head>
  <body>
    <p>Redirecting to FlashCart...</p>
  </body>
</html>
