<!DOCTYPE html>
<html lang="bn">
<!--
  =============================================================================
  FLASHCART — Offline Fallback Page
  =============================================================================
  
  Shown when the user tries to navigate to a page while completely offline
  and the page is not in the service worker cache.
  
  This page is pre-cached during service worker install, so it's always
  available even with zero network connectivity.
  
  Design: Matches FlashCart branding (dark green + white).
  No external dependencies (all styles/SVGs inline).
  =============================================================================
-->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline - FlashCart</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Hind Siliguri', 'Inter', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #F8FAF8 0%, #E8F5E9 100%);
      color: #1A1A1A;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .offline-container {
      text-align: center;
      max-width: 480px;
      padding: 48px 32px;
      background: #FFFFFF;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(27, 94, 32, 0.12);
    }
    
    .offline-icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 24px;
    }
    
    .offline-title {
      font-size: 24px;
      font-weight: 700;
      color: #1B5E20;
      margin-bottom: 8px;
    }
    
    .offline-title-bn {
      font-size: 20px;
      font-weight: 600;
      color: #2E7D32;
      margin-bottom: 16px;
    }
    
    .offline-message {
      font-size: 15px;
      color: #5F5F5F;
      line-height: 1.7;
      margin-bottom: 8px;
    }
    
    .offline-message-bn {
      font-size: 14px;
      color: #757575;
      line-height: 1.7;
      margin-bottom: 32px;
    }
    
    .retry-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 32px;
      background: #1B5E20;
      color: #FFFFFF;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      font-family: inherit;
    }
    
    .retry-button:hover {
      background: #2E7D32;
    }
    
    .retry-button:active {
      transform: scale(0.98);
    }
    
    .retry-icon {
      width: 18px;
      height: 18px;
    }
    
    .brand-footer {
      margin-top: 32px;
      font-size: 12px;
      color: #9E9E9E;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <!-- Offline icon: Cloud with X mark -->
    <svg class="offline-icon" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <!-- Cloud shape -->
      <path d="M92 60c0-2-.2-4-.6-5.8A24 24 0 0068 32a24 24 0 00-22.4 15.6A20 20 0 0028 68a20 20 0 0020 20h44a20 20 0 000-40z" fill="#E8F5E9" stroke="#1B5E20" stroke-width="2.5"/>
      <!-- X mark -->
      <path d="M52 52l16 16M68 52L52 68" stroke="#D32F2F" stroke-width="3" stroke-linecap="round"/>
      <!-- Connection dots -->
      <circle cx="60" cy="100" r="3" fill="#BDBDBD"/>
      <circle cx="60" cy="110" r="2" fill="#BDBDBD"/>
    </svg>
    
    <h1 class="offline-title">You're Offline</h1>
    <h2 class="offline-title-bn">আপনি অফলাইনে আছেন</h2>
    
    <p class="offline-message">
      It seems you've lost your internet connection. Please check your WiFi or mobile data and try again.
    </p>
    <p class="offline-message-bn">
      মনে হচ্ছে আপনার ইন্টারনেট সংযোগ বিচ্ছিন্ন হয়েছে। আপনার WiFi বা মোবাইল ডাটা পরীক্ষা করে আবার চেষ্টা করুন।
    </p>
    
    <button class="retry-button" onclick="window.location.reload()">
      <!-- Retry icon: Circular arrow -->
      <svg class="retry-icon" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1.5 9a7.5 7.5 0 0112.8-5.3L16.5 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M16.5 7.5h-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M16.5 1.5v6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M16.5 9a7.5 7.5 0 01-12.8 5.3L1.5 16.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M1.5 10.5h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M1.5 16.5v-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Try Again
    </button>
    
    <div class="brand-footer">
      FlashCart - Powered by BSDC
    </div>
  </div>
</body>
</html>
